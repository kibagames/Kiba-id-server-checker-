name: Auto Unzip

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip
        run: |
          unzip "*.zip" -d extracted
          cp -r extracted/* .
          rm -rf extracted
          rm -f *.zip

      - name: Push extracted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Extracted zip" || echo "No changes"

          git push
